{% extends "templates/web.html" %}

{% block page_content %}
<div class="cart-container">
    <!-- Header -->
    <div class="cart-header">
        <a href="/store" class="back-link">← Back to Store</a>
        <h1>Shopping Cart</h1>
    </div>

    <!-- Cart Content -->
    <div class="cart-content">
        <div class="cart-items" id="cart-items">
            <div class="cart-empty" id="cart-empty">
                <div class="empty-icon">🛒</div>
                <h3>Your cart is empty</h3>
                <p>Looks like you haven't added anything yet</p>
                <a href="/store" class="continue-shopping-btn">Continue Shopping</a>
            </div>
        </div>

        <div class="cart-summary-panel" id="cart-summary" style="display: none;">
            <h2>Order Summary</h2>
            <div class="summary-items" id="summary-items"></div>
            <div class="summary-divider"></div>
            <div class="summary-row total">
                <span>Total</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button class="checkout-btn" id="checkout-btn" onclick="proceedToCheckout()">
                Proceed to Checkout →
            </button>
            <button class="clear-cart-btn" onclick="clearCart()">Clear Cart</button>
        </div>
    </div>
</div>
{% endblock %}

{% block style %}
<style>
    :root {
        --primary: #4f46e5;
        --primary-dark: #4338ca;
        --primary-light: #818cf8;
        --bg: #f8fafc;
        --card-bg: #ffffff;
        --text: #1e293b;
        --text-muted: #64748b;
        --border: #e2e8f0;
        --danger: #ef4444;
        --success: #10b981;
        --radius: 12px;
        --shadow: 0 1px 3px rgba(0,0,0,0.06);
        --shadow-lg: 0 10px 25px rgba(0,0,0,0.08);
        --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    .cart-container {
        max-width: 960px;
        margin: 0 auto;
        padding: 32px 24px 60px;
    }

    .cart-header {
        margin-bottom: 32px;
    }

    .back-link {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        color: var(--primary);
        text-decoration: none;
        font-weight: 500;
        font-size: 0.875rem;
        margin-bottom: 12px;
        transition: var(--transition);
    }

    .back-link:hover { color: var(--primary-dark); }

    .cart-header h1 {
        font-size: 1.75rem;
        font-weight: 800;
        color: var(--text);
    }

    .cart-content {
        display: grid;
        grid-template-columns: 1fr 340px;
        gap: 32px;
        align-items: start;
    }

    /* Cart Items */
    .cart-items-list {
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    .cart-item {
        display: flex;
        gap: 20px;
        padding: 20px;
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        transition: var(--transition);
    }

    .cart-item:hover {
        border-color: var(--primary-light);
        box-shadow: var(--shadow-lg);
    }

    .cart-item-image {
        width: 80px;
        height: 80px;
        border-radius: 8px;
        overflow: hidden;
        flex-shrink: 0;
        background: #f1f5f9;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .cart-item-image span {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--primary);
        opacity: 0.4;
    }

    .cart-item-details {
        flex: 1;
        min-width: 0;
    }

    .cart-item-name {
        font-size: 1.0625rem;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 4px;
    }

    .cart-item-price {
        font-size: 0.9375rem;
        color: var(--text-muted);
        margin-bottom: 12px;
    }

    .cart-item-actions {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .qty-btn {
        width: 36px;
        height: 36px;
        border: 2px solid var(--border);
        border-radius: 8px;
        background: var(--card-bg);
        color: var(--text);
        font-size: 1.125rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .qty-btn:hover {
        border-color: var(--primary);
        background: #eef2ff;
    }

    .qty-value {
        font-size: 1.0625rem;
        font-weight: 700;
        color: var(--text);
        min-width: 32px;
        text-align: center;
    }

    .cart-item-total {
        font-size: 1.125rem;
        font-weight: 800;
        color: var(--text);
        min-width: 80px;
        text-align: right;
    }

    .remove-btn {
        background: none;
        border: none;
        color: var(--danger);
        font-size: 0.8125rem;
        font-weight: 600;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 6px;
        transition: var(--transition);
    }

    .remove-btn:hover {
        background: #fef2f2;
    }

    /* Cart Empty */
    .cart-empty {
        text-align: center;
        padding: 60px 20px;
    }

    .cart-empty .empty-icon { font-size: 4rem; margin-bottom: 16px; }
    .cart-empty h3 { font-size: 1.375rem; color: var(--text); margin-bottom: 8px; }
    .cart-empty p { color: var(--text-muted); margin-bottom: 24px; }

    .continue-shopping-btn {
        display: inline-block;
        padding: 12px 32px;
        background: var(--primary);
        color: white;
        text-decoration: none;
        border-radius: 100px;
        font-weight: 600;
        transition: var(--transition);
    }

    .continue-shopping-btn:hover {
        background: var(--primary-dark);
        transform: translateY(-1px);
    }

    /* Summary Panel */
    .cart-summary-panel {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 24px;
        box-shadow: var(--shadow);
        position: sticky;
        top: 32px;
    }

    .cart-summary-panel h2 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 20px;
    }

    .summary-items {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 16px;
    }

    .summary-item {
        display: flex;
        justify-content: space-between;
        font-size: 0.875rem;
        color: var(--text-muted);
    }

    .summary-divider {
        height: 1px;
        background: var(--border);
        margin: 12px 0;
    }

    .summary-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.9375rem;
        color: var(--text);
    }

    .summary-row.total {
        font-size: 1.25rem;
        font-weight: 800;
        color: var(--text);
        margin-bottom: 24px;
    }

    .checkout-btn {
        width: 100%;
        padding: 14px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 100px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: var(--transition);
        margin-bottom: 12px;
    }

    .checkout-btn:hover {
        background: var(--primary-dark);
        transform: translateY(-1px);
        box-shadow: var(--shadow-lg);
    }

    .clear-cart-btn {
        width: 100%;
        padding: 10px;
        background: none;
        border: 2px solid var(--border);
        border-radius: 100px;
        color: var(--text-muted);
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
    }

    .clear-cart-btn:hover {
        border-color: var(--danger);
        color: var(--danger);
        background: #fef2f2;
    }

    @media (max-width: 768px) {
        .cart-content {
            grid-template-columns: 1fr;
        }

        .cart-summary-panel {
            position: static;
        }
    }
</style>
{% endblock %}

{% block script %}
<script>
    frappe.ready(() => {
        renderCart();
    });

    function getCart() {
        try {
            return JSON.parse(localStorage.getItem('store_cart')) || [];
        } catch {
            return [];
        }
    }

    function saveCart(cart) {
        localStorage.setItem('store_cart', JSON.stringify(cart));
    }

    function renderCart() {
        const cart = getCart();
        const container = document.getElementById('cart-items');
        const summary = document.getElementById('cart-summary');

        if (cart.length === 0) {
            document.getElementById('cart-empty').style.display = 'block';
            summary.style.display = 'none';
            return;
        }

        document.getElementById('cart-empty').style.display = 'none';
        summary.style.display = 'block';

        let html = '<div class="cart-items-list">';
        let summaryHtml = '';
        let total = 0;

        cart.forEach((item, index) => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;

            html += `
                <div class="cart-item" data-index="${index}">
                    <div class="cart-item-image">
                        <span>${item.name[0]}</span>
                    </div>
                    <div class="cart-item-details">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-price">$${item.price.toFixed(2)} each</div>
                        <div class="cart-item-actions">
                            <button class="qty-btn" onclick="updateQty(${index}, -1)">−</button>
                            <span class="qty-value">${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
                            <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
                        </div>
                    </div>
                    <div class="cart-item-total">$${itemTotal.toFixed(2)}</div>
                </div>
            `;

            summaryHtml += `
                <div class="summary-item">
                    <span>${item.name} × ${item.quantity}</span>
                    <span>$${itemTotal.toFixed(2)}</span>
                </div>
            `;
        });

        html += '</div>';
        container.innerHTML = html;

        document.getElementById('summary-items').innerHTML = summaryHtml;
        document.getElementById('cart-total').textContent = `$${total.toFixed(2)}`;
    }

    function updateQty(index, delta) {
        const cart = getCart();
        const item = cart[index];
        if (!item) return;

        item.quantity += delta;

        if (item.quantity <= 0) {
            cart.splice(index, 1);
        }

        saveCart(cart);
        renderCart();
        updateGlobalCartCount();
    }

    function removeItem(index) {
        const cart = getCart();
        cart.splice(index, 1);
        saveCart(cart);
        renderCart();
        updateGlobalCartCount();
    }

    function clearCart() {
        if (confirm('Are you sure you want to clear your cart?')) {
            localStorage.removeItem('store_cart');
            renderCart();
            updateGlobalCartCount();
        }
    }

    function updateGlobalCartCount() {
        const cart = getCart();
        const count = cart.reduce((sum, item) => sum + item.quantity, 0);
        const el = document.getElementById('cart-count');
        if (el) el.textContent = count;
    }

    function proceedToCheckout() {
        window.location.href = '/store/checkout';
    }
</script>
{% endblock %}
